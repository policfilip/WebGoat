name: WebGoat Full Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  webgoat-full-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          check-latest: true
          cache: maven

      - name: Build WebGoat
        run: mvn clean package -DskipTests

      - name: Generate SBOM
        run: mvn org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-sbom
          path: target/bom.json

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan SBOM with Grype
        run: grype sbom:target/bom.json -o json > grype-report.json

      - name: Show Grype results with CVEs
        run: |
          jq -r '
            [
              "PACKAGE | VERSION | CVE | SEVERITY | FIXED IN",
              "------------------------------------------------------------------------"
            ],
            (
              .matches[]
              | [
                  .artifact.name,
                  .artifact.version,
                  (
                    [
                      .vulnerability.id,
                      (.vulnerability.relatedVulnerabilities[]?.id)
                    ]
                    | flatten
                    | map(select(test("^CVE-")))
                    | .[0]
                  ) // "N/A",
                  .vulnerability.severity,
                  (.vulnerability.fix.versions[0] // "none")
                ]
              | join(" | ")
            )
          ' grype-report.json | head -n 60

      - name: Upload Grype artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: grype-report.json

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth "${SNYK_TOKEN}"

      - name: Run Snyk Code SAST
        continue-on-error: true
        run: |
          snyk code test --json > snyk-code-report.json || true
          snyk code test --sarif-file-output=snyk-code.sarif || true

      - name: Show Snyk results
        if: always()
        run: |
          jq -r '
            [
              "RULE | SEVERITY | FILE",
              "-------------------------------------------------------------"
            ],
            (
              .runs[0].results[]?
              | [
                  .ruleId,
                  (.level // "unknown"),
                  (.locations[0].physicalLocation.artifactLocation.uri // "n/a")
                ]
              | join(" | ")
            )
          ' snyk-code.sarif | head -n 60

      - name: Upload Snyk SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif

      - name: Upload Snyk artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: |
            snyk-code.sarif
            snyk-code-report.json

      - name: Fail pipeline on Critical Grype findings
        run: |
          if grep -q '"severity":"Critical"' grype-report.json; then
            echo "Critical vulnerabilities found!"
            exit 1
          else
            echo "No Critical vulnerabilities found."
          fi
