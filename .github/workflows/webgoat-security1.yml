name: WebGoat Full Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  webgoat-full-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          check-latest: true
          cache: maven

      - name: Verify Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version

      - name: Verify Maven
        run: mvn -version

      - name: Build WebGoat
        run: mvn clean package -DskipTests

      - name: Generate SBOM (CycloneDX JSON)
        run: mvn org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom

      - name: Show generated files
        run: find . -name "*.json" -o -name "*.sarif" -o -name "*.txt"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgoat-sbom
          path: target/bom.json

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Verify Grype installation
        run: grype version

      - name: Scan SBOM with Grype
        run: |
          grype sbom:target/bom.json -o json > grype-report.json

      - name: Show Grype table with CVEs
        run: |
          jq -r '
            [
              "PACKAGE | VERSION | CVE | SEVERITY | FIXED IN",
              "--------------------------------------------------------------------------------"
            ],
            (
              .matches[]
              | [
                  .artifact.name,
                  .artifact.version,
                  (
                    [
                      .vulnerability.id,
                      (.vulnerability.relatedVulnerabilities[]?.id)
                    ]
                    | flatten
                    | map(select(test("^CVE-")))
                    | .[0]
                  ) // "N/A",
                  .vulnerability.severity,
                  (
                    .vulnerability.fix.versions[0] // "none"
                  )
                ]
              | join(" | ")
            )
          ' grype-report.json

      - name: Show all CVE IDs from Grype report
        run: |
          jq -r '
            .matches[]
            | [
                .vulnerability.id,
                (.vulnerability.relatedVulnerabilities[]?.id)
              ]
            | flatten
            | .[]
            | select(test("^CVE-"))
          ' grype-report.json | sort -u || true

      - name: Upload Grype JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-report
          path: grype-report.json

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth "${SNYK_TOKEN}"

      - name: Run Snyk Code SAST
        continue-on-error: true
        run: |
          snyk code test --json > snyk-code-report.json || true
          snyk code test --sarif-file-output=snyk-code.sarif || true

      - name: Show Snyk results in CLI
        if: always()
        run: |
          cat snyk-code-report.json || true

      - name: Show summarized Snyk findings
        if: always()
        run: |
          jq '.runs[0].tool.driver.name' snyk-code.sarif || true
          jq '.runs[0].results[] | {ruleId: .ruleId, level: .level, message: .message.text}' snyk-code.sarif || true

      - name: Upload Snyk SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif

      - name: Upload Snyk SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-code-sarif
          path: snyk-code.sarif

      - name: Upload Snyk JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-code-report
          path: snyk-code-report.json

      - name: Fail pipeline on Critical vulnerabilities in Grype
        run: |
          if grep -q '"severity":"Critical"' grype-report.json; then
            echo "Critical vulnerabilities found!"
            exit 1
          else
            echo "No Critical vulnerabilities found."
          fi
