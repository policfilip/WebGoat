      - name: Show Grype table with mapped CVEs
        run: |
          jq -r '
            [
              "PACKAGE | VERSION | GHSA/CVE | CVE | SEVERITY | FIXED IN",
              "--------------------------------------------------------------------------------"
            ],
            (
              .matches[]
              | [
                  .artifact.name,
                  .artifact.version,
                  .vulnerability.id,
                  (
                    [
                      .vulnerability.id,
                      (.vulnerability.relatedVulnerabilities[]?.id)
                    ]
                    | flatten
                    | map(select(test("^CVE-")))
                    | .[0]
                  ) // "N/A",
                  .vulnerability.severity,
                  (.vulnerability.fix.versions[0] // "none")
                ]
              | join(" | ")
            )
          ' grype-report.json | head -n 100
